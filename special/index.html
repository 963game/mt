<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Special Rules Records</title>
  <style>
    .star-gold{ color: var(--gold); }
    .star-silver{ color: var(--silver); }

    :root{
      --bg:#0b0e14; --line:#23304a;
      --text:#e9eefc; --muted:#9fb0d0;
      --accent:#b86bff; --accent2:#6ee7ff;
      --gold:#ffd56a; --silver:#c7d2fe; --bronze:#f2b38f;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:
        linear-gradient(rgba(11,14,20,0.70), rgba(11,14,20,0.78)),
        url("https://963game.github.io/images/スクリーンショット%202026-02-14%20224903.png") center / cover no-repeat fixed,
        radial-gradient(1200px 600px at 18% 8%, rgba(184,107,255,0.18), transparent 60%),
        radial-gradient(1200px 600px at 82% 12%, rgba(110,231,255,0.14), transparent 55%),
        var(--bg);
      padding:18px 12px 36px;
    }

    .wrap{max-width:980px;margin:0 auto}
    header{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;flex-wrap:wrap;margin:6px 0 10px}
    h1{margin:0;font-size:20px;letter-spacing:.3px}
    .sub{margin:6px 0 0;color:var(--muted);font-size:12px;line-height:1.7}

    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 12px}
    .tab{
      border:1px solid var(--line); background:rgba(18,24,38,0.65);
      color:var(--muted); padding:10px 12px; border-radius:12px; cursor:pointer;
      user-select:none; font-size:13px;
    }
    .tab.active{
      border-color:rgba(184,107,255,0.7);
      background:linear-gradient(180deg, rgba(184,107,255,0.20), rgba(18,24,38,0.65));
      color:var(--text);
    }

    .card{
      border:1px solid var(--line);
      background:rgba(18,24,38,0.88);
      border-radius:18px; overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,.35);
    }
    .card.info{
      border-color: var(--line);
      background: rgba(18,24,38,0.88);
    }
    .card h2{
      margin:0; padding:12px 12px 10px;
      font-size:13px; letter-spacing:.25px;
      border-bottom:1px solid rgba(35,48,74,0.75);
      display:flex;justify-content:space-between;gap:10px;align-items:center;
    }
    .tag{
      display:inline-flex;gap:6px;align-items:center;
      padding:4px 8px;border-radius:999px;
      border:1px solid rgba(159,176,208,0.25);
      background:rgba(159,176,208,0.08);
      color:var(--muted); font-size:12px;
      white-space:nowrap;
    }

    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:9px 10px;border-bottom:1px solid rgba(35,48,74,0.55);text-align:left}
    th{color:var(--muted);font-weight:600;font-size:12px}
    tr:last-child td{border-bottom:none}

    .right{text-align:right}
    .mono{
      font-variant-numeric:tabular-nums;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
    }
    .muted{color:var(--muted)}

    .row{display:none}
    .row.active{display:block}

    .stack{display:grid;grid-template-columns:1fr;gap:12px}
    .twoCol{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:820px){ .twoCol{grid-template-columns:1fr} }

    .infoBox{
      padding:10px 12px;
      color:var(--muted);
      font-size:12px;
      line-height:1.7;
      max-height:9.2em;
      overflow-y:auto;
      overflow-x:hidden;
      scrollbar-gutter:stable;
    }

    .scrollBox{
      max-height:65vh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-gutter:stable;
      border-top:1px solid rgba(35,48,74,0.55);
      position:relative;
    }

    .filterBar{
      padding:10px 12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .input, .select, .btn{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(18,24,38,0.65);
      color:var(--text);
      outline:none;
      font-size:13px;
    }
    .btn{
      cursor:pointer;
      color:var(--muted);
    }

    .sectionLabel{
      margin:2px 0 -2px;
      padding:0 4px;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.2px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Special Rules Records</h1>
        <div class="sub">
          コート杯 / ラケット杯 / キャラ杯 をタブで切替<br>
          各タブ内でシングルス / ダブルスを表示
        </div>
      </div>
    </header>

    <div class="tabs" id="tabs"></div>

    <section id="court" class="row active"></section>
    <section id="racket" class="row"></section>
    <section id="character" class="row"></section>

    <section id="players" class="row">
      <div class="stack">
        <div class="card">
          <h2>ログ一覧 <span class="tag">filter</span></h2>
          <div class="filterBar">
            <input id="logSearch" class="input" type="text" placeholder="名前検索" style="flex:1; min-width:220px;">
            <input id="logFrom" class="input" type="date">
            <input id="logTo" class="input" type="date">
            <select id="logCup" class="select">
              <option value="">杯すべて</option>
              <option value="court">コート</option>
              <option value="racket">ラケット</option>
              <option value="character">キャラ</option>
            </select>
            <select id="logType" class="select">
              <option value="">タイプすべて</option>
              <option value="singles">シングルス</option>
              <option value="doubles">ダブルス</option>
            </select>
            <select id="logMode" class="select">
              <option value="">モードすべて</option>
              <option value="fever">フィーバー</option>
              <option value="classic">クラシック</option>
            </select>
            <button id="logClear" class="btn" type="button">リセット</button>
          </div>

          <div class="scrollBox" style="max-height:70vh;">
            <table>
              <thead>
                <tr>
                  <th>日付</th>
                  <th>大会</th>
                  <th>杯</th>
                  <th>タイプ</th>
                  <th>アイテム</th>
                  <th>モード</th>
                  <th>順位</th>
                  <th>相方</th>
                  <th class="right">参加</th>
                  <th>プレイヤー</th>
                </tr>
              </thead>
              <tbody id="playersAll"></tbody>
            </table>
          </div>
          <div id="logHint" class="muted" style="padding:8px 12px;font-size:12px;"></div>
        </div>
      </div>
    </section>

    <section id="tournaments" class="row">
      <div class="stack">
        <div class="card">
          <h2>大会一覧 <span class="tag">recent</span></h2>
          <div class="scrollBox" style="max-height:70vh;">
            <table>
              <thead>
                <tr>
                  <th>日付</th>
                  <th>大会</th>
                  <th>杯</th>
                  <th>タイプ</th>
                  <th>アイテム</th>
                  <th>モード</th>
                  <th class="right">参加数</th>
                  <th>優勝</th>
                </tr>
              </thead>
              <tbody id="tournamentRows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const SPREADSHEET_CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vSydZeRcqGb_J3B1GadvScM6gRdCbxaQc0C4WC2vEasXU-ov21qtl2E4ae6icxrtqMdFtPZlZlTW-6s/pub?gid=739430839&single=true&output=csv";

    let events = [];
    const $ = (s)=>document.querySelector(s);

    const tabs = [
      {key:"court", label:"コート"},
      {key:"racket", label:"ラケット"},
      {key:"character", label:"キャラ"},
      {key:"players", label:"ログ"},
      {key:"tournaments", label:"大会"},
    ];

    const CUP_LABEL = {
      court: "コート杯",
      racket: "ラケット杯",
      character: "キャラ杯",
    };
    const TYPE_LABEL = {
      singles: "シングルス",
      doubles: "ダブルス",
    };
    const MODE_LABEL = {
      fever: "フィーバー",
      classic: "クラシック",
      "": "総合",
    };

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function normalizeText(s){
      return String(s || "").trim().toLowerCase();
    }

    function parseCSV(text){
      const out = [];
      let row = [];
      let cur = "";
      let inQ = false;

      for(let i=0;i<text.length;i++){
        const c = text[i];
        const n = text[i+1];

        if(inQ){
          if(c === '"' && n === '"'){ cur += '"'; i++; }
          else if(c === '"'){ inQ = false; }
          else{ cur += c; }
        }else{
          if(c === '"'){ inQ = true; }
          else if(c === ","){ row.push(cur); cur = ""; }
          else if(c === "\n"){ row.push(cur); out.push(row); row = []; cur = ""; }
          else if(c === "\r"){}
          else{ cur += c; }
        }
      }
      if(cur.length || row.length){ row.push(cur); out.push(row); }
      return out.filter(r => r.some(v => String(v||"").trim() !== ""));
    }

    function parseDateLoose(v){
      const s = String(v||"").trim();
      if(!s) return null;

      let m;
      if((m = s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/))){
        const d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
        return isNaN(d) ? null : d;
      }
      const d2 = new Date(s);
      return isNaN(d2) ? null : d2;
    }

    function toJPDate(d){
      if(!(d instanceof Date) || isNaN(d)) return "";
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const da = String(d.getDate()).padStart(2,"0");
      return `${y}/${m}/${da}`;
    }

    function normalizeCup(s){
      const t = normalizeText(s);
      if(t.includes("court") || t.includes("コート")) return "court";
      if(t.includes("racket") || t.includes("ラケット")) return "racket";
      if(t.includes("character") || t.includes("char") || t.includes("キャラ")) return "character";
      return "";
    }

    function normalizeMode(s){
      const t = normalizeText(s);
      if(t.includes("fever") || t.includes("フィーバ")) return "fever";
      if(t.includes("classic") || t.includes("クラシ")) return "classic";
      return "";
    }

    function normalizeType(s){
      const t = normalizeText(s);
      if(t.includes("single") || t.includes("シングル")) return "singles";
      if(t.includes("double") || t.includes("ダブル")) return "doubles";
      return "";
    }

    function stars(n, cls){
      if(!n) return `<span class="muted">—</span>`;
      return `<span class="${cls}">☆${n}</span>`;
    }

    function labelCup(cup){ return CUP_LABEL[cup] || "—"; }
    function labelType(type){ return TYPE_LABEL[type] || "—"; }
    function labelMode(mode){ return MODE_LABEL[mode] || "—"; }

    function initTabs(){
      const wrap = $("#tabs");
      wrap.innerHTML = "";
      tabs.forEach((t, i)=>{
        const btn = document.createElement("button");
        btn.type = "button";
        btn.id = "tab_" + t.key;
        btn.className = "tab" + (i===0 ? " active" : "");
        btn.textContent = t.label;
        btn.addEventListener("click", ()=> setActiveTab(t.key));
        wrap.appendChild(btn);
      });
    }

    function setActiveTab(key){
      tabs.forEach(t=>{
        $("#tab_"+t.key)?.classList.toggle("active", t.key===key);
        $("#"+t.key)?.classList.toggle("active", t.key===key);
      });
    }

    function addTiedRanks(rows){
      let rank = 0;
      let shown = 0;
      let prev = null;

      return rows.map(r=>{
        shown += 1;
        const key = Number.isFinite(r.avgRank) ? r.avgRank.toFixed(4) : String(shown);
        if(prev === null || key !== prev){
          rank = shown;
          prev = key;
        }
        return {...r, rank};
      });
    }

    function validCupTypeMode(e, cupKey, type, mode=""){
      if(e.cup !== cupKey) return false;
      if(e.type !== type) return false;
      if(cupKey === "racket" && e.mode !== "fever") return false;
      if(mode && e.mode !== mode) return false;
      return true;
    }

    function computeStats(cupKey, type, mode=""){
      const map = new Map();

      const add = (name, rank)=>{
        if(!name) return;
        if(!(Number.isFinite(rank) && rank > 0)) return;
        const v = map.get(name) ?? {plays:0, gold:0, silver:0, rankSum:0};
        v.plays += 1;
        v.rankSum += rank;
        if(rank===1) v.gold += 1;
        if(rank===2) v.silver += 1;
        map.set(name, v);
      };

      (events || []).filter(e => validCupTypeMode(e, cupKey, type, mode)).forEach(e=>{
        (e.results || []).forEach(r=>{
          if(type === "singles"){
            add(r.player, Number(r.rank));
          }else{
            add(r.p1, Number(r.rank));
            add(r.p2, Number(r.rank));
          }
        });
      });

      return Array.from(map.entries())
        .map(([name,v])=>({
          name,
          plays:v.plays,
          gold:v.gold,
          silver:v.silver,
          avgRank: v.rankSum / v.plays
        }))
        .sort((a,b)=>
          a.avgRank - b.avgRank ||
          b.gold - a.gold ||
          b.silver - a.silver ||
          a.name.localeCompare(b.name, "ja")
        );
    }

    function latestEvent(cupKey, type, mode=""){
      const list = (events || [])
        .filter(e => validCupTypeMode(e, cupKey, type, mode))
        .sort((a,b)=>{
          const ad = a.date instanceof Date && !isNaN(a.date) ? a.date.getTime() : -Infinity;
          const bd = b.date instanceof Date && !isNaN(b.date) ? b.date.getTime() : -Infinity;
          return bd - ad;
        });
      return list[0] ?? null;
    }

    function formatWinnerForEvent(e){
      if(!e || !e.results?.length) return "—";
      const win = e.results.find(r => Number(r.rank) === 1);
      if(!win) return "—";
      if(e.type === "singles") return win.player || "—";
      return `${win.p1 || "—"} / ${win.p2 || "—"}`;
    }

    function podiumText(cupKey, type, mode=""){
      const e = latestEvent(cupKey, type, mode);
      if(!e) return "—";

      const atRank = (rank)=>{
        const r = (e.results || []).find(x => Number(x.rank) === rank);
        if(!r) return "—";
        if(e.type === "singles") return r.player || "—";
        return `${r.p1 || "—"} / ${r.p2 || "—"}`;
      };

      const itemText = e.item ? `　${e.item}` : "";
      return `${e.dateStr}　${e.name}${itemText}　1位 ${atRank(1)}　2位 ${atRank(2)}　3位 ${atRank(3)}`;
    }

    function renderOverall(tbodyId, rows){
      const tb = document.getElementById(tbodyId);
      if(!tb) return;

      tb.innerHTML = "";
      if(rows.length === 0){
        tb.innerHTML = `<tr><td colspan="5" class="muted">まだデータがありません</td></tr>`;
        return;
      }

      const top8 = rows.slice(0, 8);
      addTiedRanks(top8).forEach(r=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="mono">${r.rank}</td>
          <td>${escapeHtml(r.name)}</td>
          <td class="right mono">${r.plays}</td>
          <td class="right mono">${stars(r.gold, "star-gold")}</td>
          <td class="right mono">${stars(r.silver, "star-silver")}</td>
        `;
        tb.appendChild(tr);
      });
    }

    function renderRankingChunk(tbody, rows, start, end){
      const frag = document.createDocumentFragment();
      for(let i=start; i<end; i++){
        const r = rows[i];
        const tr = document.createElement("tr");
        tr.dataset.idx = String(i);
        tr.innerHTML = `
          <td class="mono">${r.rank}</td>
          <td>${escapeHtml(r.name)}</td>
          <td class="right mono">${r.plays}</td>
          <td class="right mono">${stars(r.gold, "star-gold")}</td>
          <td class="right mono">${stars(r.silver, "star-silver")}</td>
        `;
        frag.appendChild(tr);
      }
      tbody.appendChild(frag);
    }

    function setupFold(prefix){
      const btn  = document.getElementById(prefix + "FoldBtn");
      const body = document.getElementById(prefix + "FoldBody");
      if(!btn || !body) return;

      btn.addEventListener("click", ()=>{
        const open = body.style.display !== "none";
        body.style.display = open ? "none" : "block";
        btn.textContent = open ? "開く" : "閉じる";
      });
    }

    function setupRankList(prefix, cupKey, type, mode=""){
      const tb = document.getElementById(prefix + "RankAll");
      const sentinel = document.getElementById(prefix + "RankSentinel");
      const hint = document.getElementById(prefix + "RankHint");
      const input = document.getElementById(prefix + "Search");
      const btn = document.getElementById(prefix + "SearchBtn");
      const reset = document.getElementById(prefix + "ResetBtn");
      const rootEl = document.getElementById(prefix + "RankScroll");
      if(!tb || !sentinel || !input || !btn || !reset || !rootEl) return;

      let io = null;
      let rows = [];
      let visible = 0;
      const step = 20;

      const ensureVisible = (count)=>{
        const next = Math.min(count, rows.length);
        if(next <= visible) return;
        renderRankingChunk(tb, rows, visible, next);
        visible = next;
        if(hint) hint.textContent = `表示：${visible}/${rows.length}`;
      };

      const rebuild = ()=>{
        if(io) io.disconnect();

        rows = addTiedRanks(computeStats(cupKey, type, mode));
        tb.innerHTML = "";
        visible = 0;
        ensureVisible(step);

        io = new IntersectionObserver((ents)=>{
          for(const e of ents){
            if(e.isIntersecting) ensureVisible(visible + step);
          }
        }, {root: rootEl});

        io.observe(sentinel);
      };

      const jump = ()=>{
        const q = normalizeText(input.value);
        if(!q) return;

        const idx = rows.findIndex(r => normalizeText(r.name).includes(q));
        if(idx < 0){
          if(hint) hint.textContent = `「${input.value}」は見つからない`;
          return;
        }

        ensureVisible(idx + 1);
        const tr = tb.querySelector(`tr[data-idx="${idx}"]`);
        if(tr){
          tr.scrollIntoView({behavior:"smooth", block:"center"});
          tr.style.background = "rgba(184,107,255,0.16)";
          setTimeout(()=> tr.style.background = "", 1200);
        }
        if(hint) hint.textContent = `「${input.value}」へ移動：${idx+1}位`;
      };

      rebuild();
      btn.addEventListener("click", jump);
      input.addEventListener("keydown", e=>{
        if(e.key === "Enter"){
          e.preventDefault();
          jump();
        }
      });
      reset.addEventListener("click", ()=>{
        input.value = "";
        rebuild();
      });
    }

    function buildModeBoardsHTML(cupKey, type){
      if(cupKey === "racket"){
        return `
          <div class="card">
            <h2>${labelType(type)}｜フィーバー <span class="tag">top 8</span></h2>
            <div style="overflow:auto">
              <table>
                <thead>
                  <tr>
                    <th>順位</th><th>プレイヤー</th><th class="right">参加</th><th class="right">☆（1位）</th><th class="right">☆（2位）</th>
                  </tr>
                </thead>
                <tbody id="${cupKey}_${type}_feverOverall"></tbody>
              </table>
            </div>
          </div>
        `;
      }

      return `
        <div class="card">
          <h2>${labelType(type)}｜フィーバー <span class="tag">top 8</span></h2>
          <div style="overflow:auto">
            <table>
              <thead>
                <tr>
                  <th>順位</th><th>プレイヤー</th><th class="right">参加</th><th class="right">☆（1位）</th><th class="right">☆（2位）</th>
                </tr>
              </thead>
              <tbody id="${cupKey}_${type}_feverOverall"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <h2>${labelType(type)}｜クラシック <span class="tag">top 8</span></h2>
          <div style="overflow:auto">
            <table>
              <thead>
                <tr>
                  <th>順位</th><th>プレイヤー</th><th class="right">参加</th><th class="right">☆（1位）</th><th class="right">☆（2位）</th>
                </tr>
              </thead>
              <tbody id="${cupKey}_${type}_classicOverall"></tbody>
            </table>
          </div>
        </div>
      `;
    }

function buildCupSection(cupKey){
  const cupLabel = labelCup(cupKey);
  const isRacket = cupKey === "racket";

  if (isRacket) {
    return `
      <div class="stack">
        <div class="card info">
          <h2>更新情報 <span class="tag">info</span></h2>
          <div class="infoBox">
            <div>${cupLabel}｜シングルス｜最新：<span id="${cupKey}_latestSinglesFever" class="mono"></span></div>
            <div>${cupLabel}｜ダブルス｜最新：<span id="${cupKey}_latestDoublesFever" class="mono"></span></div>
            <div>更新：<span id="${cupKey}_updatedAt" class="mono"></span></div>
          </div>
        </div>

        <div class="twoCol">
          <div class="card">
            <h2>${cupLabel}｜シングルス総合（個人） <span class="tag">top 8</span></h2>
            <div style="overflow:auto">
              <table>
                <thead>
                  <tr>
                    <th>順位</th><th>プレイヤー</th><th class="right">参加</th><th class="right">☆（1位）</th><th class="right">☆（2位）</th>
                  </tr>
                </thead>
                <tbody id="${cupKey}_singles_overall"></tbody>
              </table>
            </div>

    async function loadEventsFromCsv(){
      const res = await fetch(SPREADSHEET_CSV_URL, {cache:"no-store"});
      if(!res.ok) throw new Error("CSV取得に失敗: " + res.status);
      const text = await res.text();

      const grid = parseCSV(text);
      if(grid.length < 2) return;

      const header = grid[0].map((h, i) => {
        let v = String(h || "").trim();
        if (i === 0) v = v.replace(/^\uFEFF/, "");
        return v;
      });

      const dataRows = grid.slice(1);

      const records = dataRows.map(r=>{
        const obj = {};
        header.forEach((h, i)=>{ obj[h] = r[i] ?? ""; });
        return obj;
      });

      const map = new Map();

      for(const rec of records){
        const dateRaw = rec.date || rec["﻿date"] || "";
        const date = parseDateLoose(dateRaw);
        const dateStr = date ? toJPDate(date) : String(dateRaw).trim();
        const name = String(rec.tournament || "").trim();
        const cup = normalizeCup(rec.category);
        const type = normalizeType(rec.type);
        const rawMode = normalizeMode(rec.mode);
        const mode = cup === "racket" ? "fever" : rawMode;
        const item = String(rec.item || "").trim();
        const rank = Number(rec.rank);

        if(!cup || !type || !name) continue;
        if(cup !== "racket" && !mode) continue;

        const key = `${dateStr}__${name}__${cup}__${type}__${mode}__${item}`;
        const ev = map.get(key) ?? {
          date,
          dateStr,
          name,
          cup,
          type,
          mode,
          item,
          note: String(rec.note || "").trim(),
          format: String(rec.format || "").trim(),
          results:[]
        };

        if(type === "singles"){
          const player = String(rec.p1 || "").trim();
          if(player){
            ev.results.push({player, rank});
          }
        }else{
          const p1 = String(rec.p1 || "").trim();
          const p2 = String(rec.p2 || "").trim();
          if(p1 && p2){
            ev.results.push({p1, p2, rank});
          }
        }

        map.set(key, ev);
      }

      events = Array.from(map.values())
        .filter(e => e.results.length > 0)
        .map(e => ({
          ...e,
          results: e.results.sort((a,b)=> Number(a.rank) - Number(b.rank))
        }))
        .sort((a,b)=>{
          const ad = a.date instanceof Date && !isNaN(a.date) ? a.date.getTime() : -Infinity;
          const bd = b.date instanceof Date && !isNaN(b.date) ? b.date.getTime() : -Infinity;
          return bd - ad;
        });
    }

    function getAllPlayerRows(){
      const out = [];

      for(const e of events){
        for(const r of (e.results || [])){
          if(e.type === "singles"){
            out.push({
              date: e.dateStr,
              tournament: e.name,
              cup: e.cup,
              type: e.type,
              item: e.item,
              mode: e.mode,
              rank: r.rank,
              partner: "",
              pt: 1,
              player: r.player || "",
            });
          }else{
            out.push({
              date: e.dateStr,
              tournament: e.name,
              cup: e.cup,
              type: e.type,
              item: e.item,
              mode: e.mode,
              rank: r.rank,
              partner: r.p2 || "",
              pt: 1,
              player: r.p1 || "",
            });
            out.push({
              date: e.dateStr,
              tournament: e.name,
              cup: e.cup,
              type: e.type,
              item: e.item,
              mode: e.mode,
              rank: r.rank,
              partner: r.p1 || "",
              pt: 1,
              player: r.p2 || "",
            });
          }
        }
      }

      return out.sort((a,b)=>{
        if(a.date < b.date) return 1;
        if(a.date > b.date) return -1;
        return 0;
      });
    }

    function renderPlayersAll(rows){
      const tb = $("#playersAll");
      if(!tb) return;

      tb.innerHTML = "";
      if(rows.length === 0){
        tb.innerHTML = `<tr><td colspan="10" class="muted">該当データがありません</td></tr>`;
        return;

      rows.forEach(r=>{

          <td>${escapeHtml(r.tournament)}</td>

          <td>${escapeHtml(r.item || "—")}</td>

          <td>${escapeHtml(r.partner || "—")}</td>
          <td class="right mono">${escapeHtml(String(r.pt ?? 0))}</td>
          <td>${escapeHtml(r.player)}</td>
        `;
        tb.appendChild(tr);
      });
    }

    function setupLogFilters(){
      const allRows = getAllPlayerRows();

      const fSearch = $("#logSearch");
      const fFrom = $("#logFrom");
      const fTo = $("#logTo");
      const fCup = $("#logCup");
      const fType = $("#logType");
      const fMode = $("#logMode");
      const clr = $("#logClear");
      const hint = $("#logHint");

      const apply = ()=>{
        const q = normalizeText(fSearch.value);
        const from = fFrom.value || "";
        const to = fTo.value || "";
        const cup = fCup.value || "";
        const type = fType.value || "";
        const mode = fMode.value || "";

        const rows = allRows.filter(r=>{
          if(q){
            const hay = normalizeText([
              r.player, r.partner, r.tournament, r.item, labelCup(r.cup), labelType(r.type), labelMode(r.mode)
            ].join(" "));
            if(!hay.includes(q)) return false;
          }
          if(from && r.date.replaceAll("/","-") < from) return false;
          if(to && r.date.replaceAll("/","-") > to) return false;
          if(cup && r.cup !== cup) return false;
          if(type && r.type !== type) return false;
          if(mode && r.mode !== mode) return false;
          return true;
        });

        renderPlayersAll(rows);
        if(hint) hint.textContent = `${rows.length}件`;
      };

      renderPlayersAll(allRows);
      if(hint) hint.textContent = `${allRows.length}件`;

      [fSearch, fFrom, fTo, fCup, fType, fMode].forEach(el=>{
        el?.addEventListener("input", apply);
        el?.addEventListener("change", apply);
      });

      clr?.addEventListener("click", ()=>{
        fSearch.value = "";
        fFrom.value = "";
        fTo.value = "";
        fCup.value = "";
        fType.value = "";
        fMode.value = "";
        renderPlayersAll(allRows);
        if(hint) hint.textContent = `${allRows.length}件`;
      });
    }

    function renderCup(cupKey){
      const now = new Date().toLocaleString("ja-JP");
      const upd = document.getElementById(`${cupKey}_updatedAt`);
      if(upd) upd.textContent = now;

      const lsf = document.getElementById(`${cupKey}_latestSinglesFever`);
      const lsc = document.getElementById(`${cupKey}_latestSinglesClassic`);

      const ldc = document.getElementById(`${cupKey}_latestDoublesClassic`);

      if(lsf) lsf.textContent = podiumText(cupKey, "singles", "fever");
      if(lsc) lsc.textContent = podiumText(cupKey, "singles", "classic");
      if(ldf) ldf.textContent = podiumText(cupKey, "doubles", "fever");
      if(ldc) ldc.textContent = podiumText(cupKey, "doubles", "classic");

      renderOverall(`${cupKey}_singles_overall`, computeStats(cupKey, "singles", ""));
      renderOverall(`${cupKey}_doubles_overall`, computeStats(cupKey, "doubles", ""));

      renderOverall(`${cupKey}_singles_feverOverall`, computeStats(cupKey, "singles", "fever"));
      renderOverall(`${cupKey}_doubles_feverOverall`, computeStats(cupKey, "doubles", "fever"));

      if(cupKey !== "racket"){
        renderOverall(`${cupKey}_singles_classicOverall`, computeStats(cupKey, "singles", "classic"));
        renderOverall(`${cupKey}_doubles_classicOverall`, computeStats(cupKey, "doubles", "classic"));
      }

      setupFold(`${cupKey}_singles`);
      setupFold(`${cupKey}_doubles`);
      setupRankList(`${cupKey}_singles`, cupKey, "singles", "");
      setupRankList(`${cupKey}_doubles`, cupKey, "doubles", "");
    }

      renderTournamentList();
      setActiveTab("court");
